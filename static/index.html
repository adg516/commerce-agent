<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commerce Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="particles"></div>

    <main class="shell">
      <section class="workspace">
        <div class="panel glass">
          <div class="panel-header">
            <h2>Palona</h2>
          </div>

          <div id="messages" class="messages">
            <article class="message assistant">
              <div class="avatar">AI</div>
              <div class="bubble">Ask about products, price ranges, activities, or upload an image for visual matching.</div>
            </article>
          </div>

          <form id="chatForm" class="chat-form">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Ask about products, or attach an image..."
            ></textarea>
            <div class="form-row">
              <label class="clip-btn" for="imageInput" title="Attach image">
                <input id="imageInput" type="file" accept="image/*" hidden />
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              </label>
              <select id="catalogSelect" class="catalog-select" title="Choose catalog">
                <option value="all">All Catalogs</option>
              </select>
              <input id="catalogCsvInput" type="file" accept=".csv,text/csv" hidden />
              <div id="imagePreview" class="thumb-preview hidden">
                <img id="previewImg" alt="Selected preview" />
                <button id="clearImageBtn" type="button" class="thumb-clear" title="Remove image">&times;</button>
              </div>
              <button id="sendButton" type="submit" class="send-button">Send</button>
            </div>
          </form>
        </div>

        <aside class="panel glass results-panel">
          <div class="panel-header">
            <h2>Catalog Matches <span id="resultCount" class="meta-label">0 items</span></h2>
          </div>
          <div id="sources" class="sources"></div>
          <div id="productGrid" class="product-grid"></div>
        </aside>
      </section>
    </main>

    <script src="/static/tsparticles.bundle.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
