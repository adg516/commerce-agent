apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce-agent
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: commerce-agent.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: commerce-agent
                port:
                  number: 80
